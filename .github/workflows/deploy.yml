# M2 Platform — Deploy to cPanel via FTP on push to main
#
# ALTERNATIVE to cPanel Git Version Control. Use ONE of the two methods.
# Setup: GitHub repo → Settings → Secrets and variables → Actions → add:
#   FTP_SERVER   = ftp.m2team.se  (from cPanel → FTP Accounts)
#   FTP_USERNAME = deploy@m2team.se
#   FTP_PASSWORD = ********
name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual "Run workflow" button

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Syntax check all PHP files
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq php-cli
          ERRORS=0
          for f in $(find . -name "*.php" -not -path "./vendor/*"); do
            php -l "$f" > /dev/null 2>&1 || { echo "SYNTAX ERROR: $f"; ERRORS=1; }
          done
          exit $ERRORS

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/data/*.sqlite*
            **/uploads/**
            router.php
            start-local.sh
            start-local.bat
            DEPLOY.md
            README.md
