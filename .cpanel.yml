---
# M2 Platform — cPanel Git Version Control deployment
# Triggered automatically on "Pull or Deploy" in cPanel → Git Version Control.
# DEPLOYPATH must match your account, e.g. /home/m2team/public_html/
deployment:
  tasks:
    - export DEPLOYPATH=/home/m2team/public_html/
    # Sync everything except git/dev files. Keeps live database + uploads.
    - /bin/cp -R 404.php bli-partner.php faq.php index.php integritetspolicy.php kontakt.php offert.php om-oss.php prisguide.php projekt.php $DEPLOYPATH
    - /bin/cp -R .htaccess composer.json robots.txt sitemap.xml $DEPLOYPATH
    - /bin/cp -R includes css js send vendor tjanster blogg crm $DEPLOYPATH
    - /bin/cp -R goteborg kungsbacka molndal kungalv lerum alingsas trollhattan askim hisingen molnlycke $DEPLOYPATH
    # Data dir: create + protect, but NEVER overwrite the live SQLite database
    - /bin/mkdir -p $DEPLOYPATH/data $DEPLOYPATH/uploads
    - /bin/cp data/.htaccess $DEPLOYPATH/data/.htaccess
    - /bin/chmod 755 $DEPLOYPATH/data $DEPLOYPATH/uploads
